site_name: "{{cookiecutter.project_name}}"
site_description: "{{cookiecutter.project_description}}"
site_author: "{{cookiecutter.author_name}}"
site_url: "https://{{cookiecutter.github_username}}.github.io/{{cookiecutter.github_repo}}/"
repo_name: "{{cookiecutter.github_username}}/{{cookiecutter.github_repo}}"
repo_url: "https://github.com/{{cookiecutter.github_username}}/{{cookiecutter.github_repo}}"

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: true

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets
  - toc:
      permalink: true
