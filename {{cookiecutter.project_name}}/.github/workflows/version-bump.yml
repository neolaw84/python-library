# ── version-bump.yml ──────────────────────────────────────────────────────────
# Auto-bump the project version whenever a PR targeting `dev` is opened or its
# bump-type label is changed.
#
# Bump type is determined by PR labels (first match wins):
#   • bump:major  → X+1.0.0
#   • bump:minor  → X.Y+1.0   (default when no bump label is present)
#   • bump:patch  → X.Y.Z+1
#
# The updated pyproject.toml is committed back to the PR's head branch.
# ──────────────────────────────────────────────────────────────────────────────
name: Version Bump – PR to dev

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - labeled
      - unlabeled

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump version on feature branch
    runs-on: ubuntu-latest

    steps:
      - name: Check out head branch (with write access)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Determine bump type from labels ───────────────────────────────────
      - name: Determine bump type
        id: bump
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"bump:major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"bump:patch"'; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=minor" >> "$GITHUB_OUTPUT"
          fi
          echo "Bump type: $(grep type= "$GITHUB_OUTPUT" | cut -d= -f2)"

      # ── Apply the version bump ─────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run bump_version.py
        run: python scripts/bump_version.py ${{ steps.bump.outputs.type }}

      # ── Commit updated pyproject.toml back to the PR branch ───────────────
      - name: Commit & push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          # Only commit if pyproject.toml actually changed
          if git diff --staged --quiet; then
            echo "No version change detected — skipping commit."
          else
            BUMP_TYPE=${{ steps.bump.outputs.type }}
            git commit -m "chore: auto-bump version [${BUMP_TYPE}] [skip ci]"
            git push
          fi
